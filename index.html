<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading…</title>

  <!-- Open Graph / Social Sharing
       UPDATE the content values below to match your config.js settings.
       These static defaults are read by social crawlers that don't run JavaScript.
       app.js will override them for visitors with JS enabled. -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   id="og-site-name"   content="My Hive Blog">
  <meta property="og:title"       id="og-title"       content="My Hive Blog">
  <meta property="og:description" id="og-description" content="A self-hosted blog powered by the Hive blockchain.">
  <meta property="og:url"         id="og-url"         content="https://yourdomain.com">
  <meta property="og:image"       id="og-image"       content="">
  <!-- Twitter/X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       id="tw-title"       content="My Hive Blog">
  <meta name="twitter:description" id="tw-description" content="A self-hosted blog powered by the Hive blockchain.">
  <meta name="twitter:image"       id="tw-image"       content="">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=Playfair+Display:wght@700;800&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <div class="site-header-brand">
        <a href="index.html" id="site-title">My Blog</a>
        <div class="site-header-tagline" id="site-tagline"></div>
      </div>
      <!-- Dark mode toggle — label is set by app.js based on current state -->
      <button id="dark-mode-toggle" class="dark-toggle" aria-label="Toggle dark mode">☾ Dark</button>
    </div>
  </header>

  <main class="site-main">
    <noscript>
      <div class="error-state">
        This blog requires JavaScript to load content from the Hive blockchain.
        Please enable JavaScript in your browser to continue.
      </div>
    </noscript>
    <section>
      <div id="loading">Fetching posts from Hive…</div>
      <div id="post-list"></div>
      <nav id="pagination"></nav>
    </section>

    <aside id="sidebar"></aside>
  </main>

  <footer class="site-footer">
    <div id="footer-widget" class="footer-widget-slot"></div>
    <span id="footer-text"></span>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>initIndex();</script>

</body>
</html>
